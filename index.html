<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Presence Scanner — Board</title>
    <meta name="description" content="Tableau de projet Trello pour le Web Presence Scanner">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-glass: rgba(255,255,255,0.04);
            --border-glass: rgba(255,255,255,0.08);
            --text-primary: #e8e8f0;
            --text-secondary: #8888a8;
            --text-muted: #555577;
            --accent-blue: #4361ee;
            --accent-purple: #7209b7;
            --accent-pink: #f72585;
            --accent-cyan: #00b4d8;
            --accent-green: #06d6a0;
            --accent-orange: #fb8500;
            --accent-yellow: #ffbe0b;
            --accent-red: #ef476f;
            --shadow-glow: 0 0 30px rgba(67,97,238,0.15);
            --radius: 12px;
            --radius-sm: 8px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: auto;
        }

        /* ───── Header ───── */
        .header {
            background: linear-gradient(135deg, rgba(67,97,238,0.12), rgba(114,9,183,0.12));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glass);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: var(--shadow-glow);
        }
        .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
        .header-sub { font-size: 13px; color: var(--text-secondary); margin-left: auto; }

        /* ───── Stats bar ───── */
        .stats-bar {
            display: flex; gap: 12px; padding: 14px 32px; flex-wrap: wrap;
            border-bottom: 1px solid var(--border-glass);
        }
        .stat {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-sm);
            padding: 8px 16px;
            font-size: 13px;
            display: flex; align-items: center; gap: 8px;
            backdrop-filter: blur(10px);
        }
        .stat-count {
            font-weight: 700; font-size: 16px;
        }

        /* ───── Board ───── */
        .board {
            display: flex;
            gap: 16px;
            padding: 20px 32px 32px;
            align-items: flex-start;
            overflow-x: auto;
            min-height: calc(100vh - 120px);
        }

        /* ───── Column ───── */
        .column {
            min-width: 310px;
            max-width: 310px;
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            padding: 0;
            flex-shrink: 0;
            transition: transform 0.2s;
        }
        .column:hover { transform: translateY(-2px); }
        .column-header {
            padding: 16px 16px 12px;
            display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-glass);
        }
        .column-dot {
            width: 10px; height: 10px; border-radius: 50%;
        }
        .column-title { font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        .column-count {
            margin-left: auto;
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .column-cards { padding: 12px; display: flex; flex-direction: column; gap: 10px; min-height: 60px; }

        /* Column droppable states */
        .column-cards.drag-over { background: rgba(67,97,238,0.06); border-radius: var(--radius-sm); }

        /* ───── Card ───── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-sm);
            padding: 14px;
            cursor: grab;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
            border-radius: 4px 0 0 4px;
        }
        .card:hover {
            border-color: rgba(67,97,238,0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transform: translateY(-1px);
        }
        .card.dragging { opacity: 0.4; transform: scale(0.95); }
        .card-title { font-weight: 600; font-size: 13px; margin-bottom: 6px; padding-left: 8px; }
        .card-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; padding-left: 8px; }
        .card-footer { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding-left: 8px; flex-wrap: wrap; }

        /* Tags */
        .tag {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .tag-frontend { background: rgba(67,97,238,0.15); color: #6d8fff; }
        .tag-backend { background: rgba(6,214,160,0.15); color: #06d6a0; }
        .tag-api { background: rgba(247,37,133,0.15); color: #f72585; }
        .tag-design { background: rgba(114,9,183,0.15); color: #c77dff; }
        .tag-devops { background: rgba(251,133,0,0.15); color: #fb8500; }
        .tag-security { background: rgba(239,71,111,0.15); color: #ef476f; }
        .tag-data { background: rgba(0,180,216,0.15); color: #00b4d8; }
        .tag-test { background: rgba(255,190,11,0.15); color: #ffbe0b; }

        /* Priority dots */
        .priority { display: flex; align-items: center; gap: 4px; margin-left: auto; font-size: 10px; color: var(--text-muted); }
        .priority-dot { width: 6px; height: 6px; border-radius: 50%; }
        .priority-high .priority-dot { background: var(--accent-red); }
        .priority-medium .priority-dot { background: var(--accent-orange); }
        .priority-low .priority-dot { background: var(--accent-green); }

        /* Card accent colors */
        .card[data-color="blue"]::before { background: var(--accent-blue); }
        .card[data-color="green"]::before { background: var(--accent-green); }
        .card[data-color="pink"]::before { background: var(--accent-pink); }
        .card[data-color="purple"]::before { background: var(--accent-purple); }
        .card[data-color="cyan"]::before { background: var(--accent-cyan); }
        .card[data-color="orange"]::before { background: var(--accent-orange); }
        .card[data-color="yellow"]::before { background: var(--accent-yellow); }
        .card[data-color="red"]::before { background: var(--accent-red); }

        /* ───── Add card ───── */
        .add-card-btn {
            background: none; border: 1px dashed rgba(255,255,255,0.1);
            border-radius: var(--radius-sm);
            padding: 10px;
            color: var(--text-muted);
            font-size: 12px; font-family: inherit;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }
        .add-card-btn:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background: rgba(67,97,238,0.05);
        }

        /* ───── Modal ───── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            padding: 28px;
            width: 420px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .modal h2 { font-size: 16px; margin-bottom: 18px; }
        .modal label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
        .modal input, .modal textarea, .modal select {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 13px;
            margin-bottom: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--accent-blue); }
        .modal textarea { resize: vertical; min-height: 70px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
        .btn {
            padding: 9px 20px;
            border-radius: var(--radius-sm);
            border: none;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); color: #fff; }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-secondary { background: var(--bg-glass); color: var(--text-secondary); border: 1px solid var(--border-glass); }
        .btn-secondary:hover { background: rgba(255,255,255,0.08); }

        /* ───── Responsive ───── */
        @media (max-width: 768px) {
            .header { padding: 12px 16px; }
            .stats-bar { padding: 10px 16px; }
            .board { padding: 12px 16px; }
            .column { min-width: 280px; max-width: 280px; }
        }

        /* ───── Scrollbar ───── */
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">🔍</div>
    <h1>Web Presence Scanner</h1>
    <span class="header-sub" id="dateDisplay"></span>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="board" id="board"></div>

<!-- Modal ajout de carte -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2>✨ Nouvelle tâche</h2>
        <label for="cardTitle">Titre</label>
        <input type="text" id="cardTitle" placeholder="Titre de la tâche...">
        <label for="cardDesc">Description</label>
        <textarea id="cardDesc" placeholder="Décris la tâche..."></textarea>
        <label for="cardTag">Tag</label>
        <select id="cardTag">
            <option value="frontend">Frontend</option>
            <option value="backend">Backend</option>
            <option value="api">API</option>
            <option value="design">Design</option>
            <option value="devops">DevOps</option>
            <option value="security">Sécurité</option>
            <option value="data">Data</option>
            <option value="test">Test</option>
        </select>
        <label for="cardPriority">Priorité</label>
        <select id="cardPriority">
            <option value="high">🔴 Haute</option>
            <option value="medium">🟠 Moyenne</option>
            <option value="low">🟢 Basse</option>
        </select>
        <input type="hidden" id="targetColumn">
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
            <button class="btn btn-primary" onclick="addNewCard()">Ajouter</button>
        </div>
    </div>
</div>

<script>
// ───── Data ─────
const COLORS = ['blue','green','pink','purple','cyan','orange','yellow','red'];
const COLUMNS = [
    { id: 'backlog', title: 'Backlog', color: '#555577' },
    { id: 'todo', title: 'À faire', color: '#4361ee' },
    { id: 'in-progress', title: 'En cours', color: '#fb8500' },
    { id: 'review', title: 'Review', color: '#7209b7' },
    { id: 'done', title: 'Terminé', color: '#06d6a0' },
];

const DEFAULT_CARDS = {
    backlog: [
        { title: 'Multi-langue (i18n)', desc: 'Support FR/EN pour l\'interface utilisateur', tag: 'frontend', priority: 'low', color: 'blue' },
        { title: 'Export PDF de rapports', desc: 'Générer des rapports PDF détaillés des résultats de scan', tag: 'frontend', priority: 'low', color: 'purple' },
        { title: 'Historique des scans', desc: 'Sauvegarder et comparer les résultats de scans dans le temps', tag: 'data', priority: 'medium', color: 'cyan' },
        { title: 'Notifications email', desc: 'Alertes automatiques quand un scan détecte des changements', tag: 'backend', priority: 'low', color: 'green' },
        { title: 'Mode sombre / clair', desc: 'Toggle theme pour l\'interface', tag: 'design', priority: 'low', color: 'yellow' },
    ],
    todo: [
        { title: 'Initialisation du projet', desc: 'Setup Next.js/Vite, structure des dossiers, ESLint, Prettier', tag: 'devops', priority: 'high', color: 'orange' },
        { title: 'Design System & UI Kit', desc: 'Définir palette, typographie, composants de base (boutons, inputs, cards)', tag: 'design', priority: 'high', color: 'purple' },
        { title: 'Architecture API backend', desc: 'Routes REST, middleware d\'authentification, rate limiting', tag: 'api', priority: 'high', color: 'pink' },
        { title: 'Scanner DNS & WHOIS', desc: 'Récupérer infos domaine : IP, NS, MX, WHOIS, expiration', tag: 'backend', priority: 'high', color: 'green' },
        { title: 'Scanner réseaux sociaux', desc: 'Vérifier la présence sur Twitter, LinkedIn, GitHub, Instagram, etc.', tag: 'api', priority: 'medium', color: 'pink' },
        { title: 'Scanner SEO basique', desc: 'Analyse title, meta description, heading structure, robots.txt, sitemap', tag: 'backend', priority: 'medium', color: 'green' },
        { title: 'Détection de technologies', desc: 'Identifier CMS, frameworks, analytics, CDN utilisés par le site', tag: 'backend', priority: 'medium', color: 'cyan' },
        { title: 'Scanner SSL/TLS', desc: 'Vérifier certificat SSL, expiration, grade de sécurité', tag: 'security', priority: 'high', color: 'red' },
        { title: 'Page de résultats', desc: 'Dashboard avec scores, graphiques et détails par catégorie', tag: 'frontend', priority: 'high', color: 'blue' },
        { title: 'Formulaire de recherche', desc: 'Input URL avec validation, auto-complétion, et historique récent', tag: 'frontend', priority: 'high', color: 'blue' },
        { title: 'Scanner de performance', desc: 'Temps de chargement, taille page, nombre de requêtes, Core Web Vitals', tag: 'backend', priority: 'medium', color: 'green' },
        { title: 'Tests unitaires & intégration', desc: 'Jest/Vitest pour backend, Cypress/Playwright pour E2E', tag: 'test', priority: 'medium', color: 'yellow' },
    ],
    'in-progress': [],
    review: [],
    done: [],
};

// ───── State ─────
let boardData = loadData() || JSON.parse(JSON.stringify(DEFAULT_CARDS));
let draggedCard = null;
let dragSourceCol = null;

function loadData() {
    try { const d = localStorage.getItem('wps-board'); return d ? JSON.parse(d) : null; }
    catch { return null; }
}
function saveData() { localStorage.setItem('wps-board', JSON.stringify(boardData)); }

// ───── Render ─────
function render() {
    const board = document.getElementById('board');
    board.innerHTML = '';

    let totalCards = 0;
    const colCounts = {};

    COLUMNS.forEach(col => {
        const cards = boardData[col.id] || [];
        colCounts[col.id] = cards.length;
        totalCards += cards.length;

        const colEl = document.createElement('div');
        colEl.className = 'column';
        colEl.innerHTML = `
            <div class="column-header">
                <span class="column-dot" style="background:${col.color}"></span>
                <span class="column-title">${col.title}</span>
                <span class="column-count">${cards.length}</span>
            </div>
            <div class="column-cards" data-column="${col.id}">
                ${cards.map((c, i) => cardHTML(c, i, col.id)).join('')}
                <button class="add-card-btn" onclick="openModal('${col.id}')">+ Ajouter une tâche</button>
            </div>
        `;
        board.appendChild(colEl);
    });

    // Stats
    document.getElementById('statsBar').innerHTML = `
        <div class="stat"><span>📋</span> Total <span class="stat-count">${totalCards}</span></div>
        <div class="stat"><span style="color:var(--accent-blue)">📝</span> À faire <span class="stat-count">${colCounts['todo']||0}</span></div>
        <div class="stat"><span style="color:var(--accent-orange)">⚡</span> En cours <span class="stat-count">${colCounts['in-progress']||0}</span></div>
        <div class="stat"><span style="color:var(--accent-purple)">🔍</span> Review <span class="stat-count">${colCounts['review']||0}</span></div>
        <div class="stat"><span style="color:var(--accent-green)">✅</span> Terminé <span class="stat-count">${colCounts['done']||0}</span></div>
    `;

    // Attach drag events
    document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('dragstart', onDragStart);
        card.addEventListener('dragend', onDragEnd);
    });
    document.querySelectorAll('.column-cards').forEach(zone => {
        zone.addEventListener('dragover', onDragOver);
        zone.addEventListener('dragleave', onDragLeave);
        zone.addEventListener('drop', onDrop);
    });
}

function cardHTML(c, index, colId) {
    const tagClass = c.tag === 'security' ? 'tag-security' : `tag-${c.tag}`;
    return `
        <div class="card" draggable="true" data-index="${index}" data-column="${colId}" data-color="${c.color}">
            <div class="card-title">${escapeHtml(c.title)}</div>
            ${c.desc ? `<div class="card-desc">${escapeHtml(c.desc)}</div>` : ''}
            <div class="card-footer">
                <span class="tag ${tagClass}">${c.tag}</span>
                <span class="priority priority-${c.priority}"><span class="priority-dot"></span>${c.priority === 'high' ? 'Haute' : c.priority === 'medium' ? 'Moyenne' : 'Basse'}</span>
            </div>
        </div>
    `;
}

function escapeHtml(t) {
    const d = document.createElement('div'); d.textContent = t; return d.innerHTML;
}

// ───── Drag & Drop ─────
function onDragStart(e) {
    draggedCard = { index: +e.target.dataset.index, column: e.target.dataset.column };
    e.target.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(e) { e.target.classList.remove('dragging'); draggedCard = null; }
function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    if (!draggedCard) return;
    const targetCol = e.currentTarget.dataset.column;
    const srcCol = draggedCard.column;
    const srcIdx = draggedCard.index;
    if (srcCol === targetCol) return;
    const card = boardData[srcCol].splice(srcIdx, 1)[0];
    boardData[targetCol].push(card);
    saveData();
    render();
}

// ───── Modal ─────
function openModal(colId) {
    document.getElementById('targetColumn').value = colId;
    document.getElementById('cardTitle').value = '';
    document.getElementById('cardDesc').value = '';
    document.getElementById('modalOverlay').classList.add('active');
    setTimeout(() => document.getElementById('cardTitle').focus(), 100);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
function addNewCard() {
    const title = document.getElementById('cardTitle').value.trim();
    if (!title) return;
    const desc = document.getElementById('cardDesc').value.trim();
    const tag = document.getElementById('cardTag').value;
    const priority = document.getElementById('cardPriority').value;
    const colId = document.getElementById('targetColumn').value;
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    boardData[colId].push({ title, desc, tag, priority, color });
    saveData();
    closeModal();
    render();
}

// ───── Init ─────
document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('fr-FR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
render();

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
});
// Close modal on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>

</body>
</html>
